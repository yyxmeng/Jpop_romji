<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日文歌詞本</title>
<link rel="stylesheet" href="shared.css">
<style>
/* ── 歌詞本專用變數（覆蓋或補充 shared.css）── */
:root{
  --verse-bg:    #13131a;
  --chorus-bg:   #1a1428;
  --bridge-bg:   #0f1a20;
  --outro-bg:    #1a0f1a;
  --rt-color:    #6b6488;
  --section-color:#4a4468;
  --font-jp:     'Noto Serif JP', serif;
  --font-ui:     'Noto Sans JP', sans-serif;
  --radius:      10px;
  --radius-sm:   6px;
  --transition:  0.18s ease;
}

*{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }

body{
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* ── 頂部標題列 ── */
.topbar{
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15,15,19,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.topbar-title{
  font-family: var(--font-jp);
  font-size: 16px;
  font-weight: 300;
  letter-spacing: 0.12em;
  color: var(--accent2);
  white-space: nowrap;
}
.toggle-wrap{
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text2);
  flex-shrink: 0;
}
.toggle{
  position: relative;
  width: 40px;
  height: 22px;
  cursor: pointer;
  flex-shrink: 0;
}
.toggle input{ opacity:0; width:0; height:0; position:absolute; }
.slider{
  position: absolute;
  inset: 0;
  background: var(--border2);
  border-radius: 22px;
  transition: var(--transition);
}
.slider:before{
  content:"";
  position: absolute;
  height: 16px; width: 16px;
  left: 3px; bottom: 3px;
  background: var(--text2);
  border-radius: 50%;
  transition: var(--transition);
}
input:checked + .slider{ background: var(--accent); }
input:checked + .slider:before{
  transform: translateX(18px);
  background: #fff;
}

/* ── 主容器 ── */
.app{ max-width: 860px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

/* ── 歌手分頁列 ── */
.artist-section{ margin-bottom: 1.5rem; }
.artist-section-label{
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.tabs{
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.tab{
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  padding: 10px 14px 8px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  font-size: 12px;
  font-family: var(--font-ui);
  cursor: pointer;
  background: var(--bg2);
  color: var(--text2);
  transition: var(--transition);
  letter-spacing: 0.02em;
  min-width: 80px;
  text-align: center;
}
.tab:hover{ border-color: var(--accent); color: var(--accent2); background: var(--bg3); }
.tab.active{
  background: var(--bg3);
  color: var(--accent2);
  border-color: var(--accent);
  font-weight: 500;
}
.tab-img{
  width: 56px;
  height: 56px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border2);
  transition: var(--transition);
  display: block;
}
.tab.active .tab-img,
.tab:hover .tab-img{ border-color: var(--accent); }
.tab-img-placeholder{
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--bg3);
  border: 2px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

/* ── YouTube 播放器 ── */
.yt-wrap{
  margin-bottom: 1.5rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg2);
}
.yt-toggle{
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  user-select: none;
  transition: var(--transition);
}
.yt-toggle:hover{ color: var(--accent2); }
.yt-toggle-left{ display: flex; align-items: center; gap: 8px; }
.yt-icon{ font-size: 18px; }
.yt-arrow{ font-size: 12px; transition: transform 0.2s; }
.yt-arrow.open{ transform: rotate(180deg); }
.yt-player{
  display: none;
}
.yt-player.show{ display: block; }
.yt-player iframe{
  width: 100%;
  height: 315px;
  border: none;
  display: block;
}

/* ── 歌曲列表 ── */
.songs-section-label{
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.songs{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 8px;
}
.song{
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  background: var(--bg2);
  transition: var(--transition);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.song:hover{
  border-color: var(--accent);
  background: var(--bg3);
  transform: translateY(-1px);
}
.song-title{ font-size: 14px; font-weight: 500; color: var(--text); }
.song-artist{ font-size: 11px; color: var(--text3); margin-top: 2px; }
.song-arrow{ color: var(--text3); font-size: 16px; flex-shrink: 0; }

/* ── 歌詞頁面 ── */
.lyric-view{ display: none; }
.lyric-view.show{ display: block; }

.back-btn{
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  padding: 7px 14px;
  margin-bottom: 1.5rem;
  transition: var(--transition);
  font-family: var(--font-ui);
}
.back-btn:hover{ border-color: var(--accent); color: var(--accent2); }

.lyric-header{
  margin-bottom: 2rem;
  padding-bottom: 1.2rem;
  border-bottom: 1px solid var(--border);
}
.lyric-title{
  font-family: var(--font-jp);
  font-size: 24px;
  font-weight: 300;
  color: var(--text);
  letter-spacing: 0.05em;
}
.lyric-artist{
  font-size: 13px;
  color: var(--text3);
  margin-top: 6px;
  letter-spacing: 0.05em;
}

/* ── 歌詞區塊 ── */
.lyric-lines{ display: flex; flex-direction: column; gap: 0; }

/* 段落容器 */
.section-block{ margin-bottom: 6px; border-radius: var(--radius); overflow: hidden; }

/* 段落標題列 */
.section-header{
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 14px;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--section-color);
  border-bottom: 1px solid transparent;
}
.section-header .line{ flex: 1; height: 1px; background: var(--border); }

/* 段落類型底色 */
.section-block.verse   { background: var(--verse-bg);  border: 1px solid var(--border); }
.section-block.chorus  { background: var(--chorus-bg); border: 1px solid #2d2048; }
.section-block.bridge  { background: var(--bridge-bg); border: 1px solid #1a3040; }
.section-block.outro   { background: var(--outro-bg);  border: 1px solid #2d1a2d; }
.section-block.intro   { background: var(--verse-bg);  border: 1px solid var(--border); }

/* 副歌標題特殊顏色 */
.section-block.chorus .section-header{ color: #7b5cb8; }
.section-block.bridge .section-header{ color: #4a7888; }
.section-block.outro  .section-header{ color: #885888; }

/* 歌詞行 */
.lb{
  padding: 6px 16px;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
}
.lb:last-child{ padding-bottom: 14px; }
.lb:first-of-type{ padding-top: 10px; }

/* 日文字體與尺寸 */
.jp{
  font-family: var(--font-jp);
  font-size: 18px;
  line-height: 3;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  color: var(--text);
}
ruby{ ruby-align: center; }
rt{
  font-size: 10px;
  color: var(--rt-color);
  line-height: 1.3;
  font-family: var(--font-ui);
  transition: opacity 0.15s, font-size 0.15s;
}
#lv-lines.hide-rt rt{ opacity: 0; font-size: 0; line-height: 0; }
#lv-lines.hide-rt .jp{ line-height: 1.8; }

/* ── 空白歌詞本提示 ── */
.empty{
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text3);
  font-size: 14px;
}

/* ── 捲動條 ── */
::-webkit-scrollbar{ width: 6px; }
::-webkit-scrollbar-track{ background: var(--bg); }
::-webkit-scrollbar-thumb{ background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover{ background: var(--accent); }

/* ── 手機響應 ── */
@media(max-width:600px){
  .topbar{ padding: 0 1rem; }
  .app{ padding: 1rem 0.75rem 3rem; }
  .songs{ grid-template-columns: 1fr; }
  .jp{ font-size: 17px; }
  .lyric-title{ font-size: 20px; }
}
</style>
</head>
<body>

<!-- 頂部列 -->
<div class="topbar">
  <div class="topbar-left">
    <a class="topbar-home" href="home.html" title="首頁">🏠</a>
    <div class="topbar-title">日文歌詞本</div>
  </div>
  <div class="toggle-wrap">
    <span>假名</span>
    <label class="toggle">
      <input type="checkbox" id="rt-toggle" checked>
      <span class="slider"></span>
    </label>
  </div>
</div>

<!-- 主內容 -->
<div class="app">

  <!-- 列表頁 -->
  <div id="list-view">
    <div class="artist-section">
      <div class="artist-section-label">歌手</div>
      <div class="tabs" id="tabs"></div>
    </div>
    <div>
      <div class="songs-section-label">歌曲</div>
      <div class="songs" id="songs"></div>
    </div>
  </div>

  <!-- 歌詞頁 -->
  <div class="lyric-view" id="lyric-view">
    <button class="back-btn" onclick="showList()">← 返回列表</button>
    <div class="lyric-header">
      <div class="lyric-title" id="lv-title"></div>
      <div class="lyric-artist" id="lv-artist"></div>
    </div>
    <!-- YouTube 播放器（有 yt 欄位才顯示）-->
    <div class="yt-wrap" id="lv-yt" style="display:none">
      <div class="yt-toggle" onclick="toggleYt(this)">
        <div class="yt-toggle-left">
          <span class="yt-icon">▶</span>
          <span>播放 MV／Official Audio</span>
        </div>
        <span class="yt-arrow">▼</span>
      </div>
      <div class="yt-player"></div>
    </div>
    <div class="lyric-lines" id="lv-lines"></div>
  </div>

</div>

<!-- ══════════════════════════════════════════
     核心引擎（請勿修改）
     ══════════════════════════════════════════ -->
<script>
// ── 工具函式 ──
function r(b,f){ return f ? `<ruby>${b}<rt>${f}</rt></ruby>` : `<span>${b}</span>`; }

// L() - 一行歌詞（無段落，直接加入當前 section）
function L(p){
  const jp = p.map(x => Array.isArray(x) ? r(x[0],x[1]) : r(x,'')).join('');
  return `<div class="lb"><div class="jp">${jp}</div></div>`;
}

// S() - 段落分隔標記
// 格式：S('verse')、S('chorus')、S('bridge')、S('outro')、S('intro')
// 或帶標籤：S('chorus|サビ')、S('bridge|ブリッジ')、S('—') 表示無標題分隔
function S(raw){
  raw = raw.trim();
  if(raw === '—' || raw === ''){
    return `<!--SECTION:verse:-->`;
  }
  // 格式：'type|label' 或 'type' 或 '— label —' 舊格式
  if(raw.includes('|')){
    const [type, label] = raw.split('|').map(s=>s.trim());
    return `<!--SECTION:${type}:${label}-->`;
  }
  // 舊格式相容：— サビ — 等
  const label = raw.replace(/^—\s*/, '').replace(/\s*—$/, '').trim();
  let type = 'verse';
  const lc = label.toLowerCase();
  if(lc.includes('サビ') || lc.includes('chorus')) type = 'chorus';
  else if(lc.includes('ブリッジ') || lc.includes('bridge')) type = 'bridge';
  else if(lc.includes('アウトロ') || lc.includes('outro') || lc.includes('ラスト')) type = 'outro';
  else if(lc.includes('イントロ') || lc.includes('intro')) type = 'intro';
  return `<!--SECTION:${type}:${label}-->`;
}

// ── 歌曲資料庫 ──
let DB = {};
let curArtist = null;
let showRt = true;

function addSong(artist, song){
  if(!DB[artist]) DB[artist] = [];
  DB[artist].push(song);
}

// ── 假名開關 ──
function syncRt(val){
  showRt = val;
  document.getElementById('lv-lines').classList.toggle('hide-rt', !val);
}
document.getElementById('rt-toggle').addEventListener('change', e => syncRt(e.target.checked));

// ── 歌手圖片對照表 ──
// 格式：'歌手名稱': 'uploads/圖片檔名'
// 若沒有圖片則顯示預設 emoji
const ARTIST_IMG = {
  'Aimer':        'uploads/aimer.jpeg',
  'Ave Mujica':   'uploads/ave_mujica.webp',
  'tuki.':        'uploads/tuki.webp',
  'back number':  'uploads/back_number.webp',
  'Riria':        'uploads/riria.jpg',
  '*Luna':        'uploads/luna.webp',
  'NANAOAKARI':   'uploads/nanaoakari.jpg',
  'ZUTOMAYO':     'uploads/zutomayo.png',
  'あたらよ':     'uploads/atarayo.webp',
  '9LANA':     'uploads/atarayo.webp',
};
const ARTIST_EMOJI = {
  'Aimer':'🎵','Ave Mujica':'🎻','tuki.':'🌙','back number':'🎸',
  'Riria':'🌸','*Luna':'🌕','NANAOAKARI':'⭐','ZUTOMAYO':'🌀','あたらよ':'🌅',
};

// ── 渲染列表 ──
function renderTabs(){
  const artists = Object.keys(DB).sort();
  document.getElementById('tabs').innerHTML = artists.map(a => {
    const imgSrc = ARTIST_IMG[a];
    const emoji  = ARTIST_EMOJI[a] || '🎤';
    const imgHTML = imgSrc
      ? `<img class="tab-img" src="${imgSrc}" alt="${a}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="tab-img-placeholder" style="display:none">${emoji}</div>`
      : `<div class="tab-img-placeholder">${emoji}</div>`;
    return `<div class="tab${a===curArtist?' active':''}" onclick="pickArtist('${CSS.escape(a)}')">
      ${imgHTML}
      <span>${a}</span>
    </div>`;
  }).join('');
}
function pickArtist(a){
  curArtist = a;
  renderTabs();
  renderSongs();
}
function renderSongs(){
  const songs = (DB[curArtist]||[]).slice().sort((a,b)=>a.sort.localeCompare(b.sort,'ja'));
  const el = document.getElementById('songs');
  if(!songs.length){ el.innerHTML = '<div class="empty">此歌手暫無歌曲</div>'; return; }
  el.innerHTML = songs.map(s =>
    `<div class="song" onclick="showLyric('${s.id}')">
      <div>
        <div class="song-title">${s.title}</div>
        <div class="song-artist">${curArtist}</div>
      </div>
      <div class="song-arrow">›</div>
    </div>`
  ).join('');
}

// ── YouTube 工具函式 ──
function extractYtId(url){
  if(!url) return null;
  url = url.trim();
  // youtu.be/XXXXXXXXXXX 格式（含 ?si= 等參數也能正確擷取）
  const m1 = url.match(/youtu\.be\/([A-Za-z0-9_\-]{11})/);
  if(m1) return m1[1];
  // youtube.com/watch?v=XXXXXXXXXXX
  const m2 = url.match(/[?&]v=([A-Za-z0-9_\-]{11})/);
  if(m2) return m2[1];
  // youtube.com/embed/XXXXXXXXXXX
  const m3 = url.match(/\/embed\/([A-Za-z0-9_\-]{11})/);
  if(m3) return m3[1];
  // youtube.com/shorts/XXXXXXXXXXX
  const m4 = url.match(/\/shorts\/([A-Za-z0-9_\-]{11})/);
  if(m4) return m4[1];
  return null;
}
function toggleYt(btn){
  const wrap   = btn.closest('.yt-wrap');
  const player = wrap.querySelector('.yt-player');
  const arrow  = btn.querySelector('.yt-arrow');
  const isOpen = player.classList.toggle('show');
  arrow.classList.toggle('open', isOpen);
  if(isOpen && !player.querySelector('iframe')){
    const vid = player.dataset.vid;
    // 用固定高度的 iframe，不依賴 padding-bottom 技巧
    player.innerHTML =
      `<iframe width="100%" height="315"
        src="https://www.youtube.com/embed/${vid}?rel=0&modestbranding=1"
        title="YouTube video player"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen></iframe>`;
  }
}

// ── 顯示歌詞 ──
function buildLyricHTML(rawLines){
  // rawLines 是 L() 和 <!--SECTION:...--> 混合的字串陣列 join 後的結果
  const html = rawLines;

  // 解析 SECTION 標記，將歌詞包進對應的 section-block div
  const sectionRe = /<!--SECTION:([^:]*):([^-]*)-->/g;
  const parts = html.split(/(<!--SECTION:[^:]*:[^-]*-->)/);

  let result = '';
  let currentType = 'verse';
  let currentLabel = '';
  let currentContent = '';
  let inSection = false;

  function flushSection(){
    if(!inSection && !currentContent.trim()) return;
    const labelHTML = currentLabel
      ? `<div class="line"></div><span>${currentLabel}</span><div class="line"></div>`
      : `<div class="line"></div>`;
    result += `<div class="section-block ${currentType}">
  <div class="section-header">${labelHTML}</div>
  ${currentContent}
</div>`;
    currentContent = '';
  }

  for(const part of parts){
    const m = part.match(/<!--SECTION:([^:]*):(.*)-->/);
    if(m){
      flushSection();
      inSection = true;
      currentType = m[1].trim() || 'verse';
      currentLabel = m[2].trim();
    } else {
      currentContent += part;
    }
  }
  flushSection();
  return result;
}

function showLyric(id){
  const song = Object.values(DB).flat().find(s => s.id === id);
  if(!song) return;
  document.getElementById('lv-title').textContent = song.title;
  document.getElementById('lv-artist').textContent = curArtist;

  // ── YouTube 播放器 ──
  const ytWrap = document.getElementById('lv-yt');
  const ytVid  = extractYtId(song.yt || '');
  if(ytVid){
    ytWrap.style.display = 'block';
    const player = ytWrap.querySelector('.yt-player');
    player.dataset.vid = ytVid;
    player.classList.remove('show');
    player.innerHTML = '';
    ytWrap.querySelector('.yt-arrow').classList.remove('open');
  } else {
    ytWrap.style.display = 'none';
  }

  // ── 歌詞 ──
  const el = document.getElementById('lv-lines');
  const raw = song.lines().join('');
  el.innerHTML = buildLyricHTML(raw);
  el.classList.toggle('hide-rt', !showRt);

  document.getElementById('list-view').style.display = 'none';
  document.getElementById('lyric-view').classList.add('show');
  window.scrollTo(0, 0);
}
function showList(){
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('lyric-view').classList.remove('show');
  window.scrollTo(0, 0);
}

// ── 初始化（所有 songs/*.js 載入後執行）──
function init(){
  const artists = Object.keys(DB).sort();
  if(artists.length){ curArtist = artists[0]; renderTabs(); renderSongs(); }
  else document.getElementById('songs').innerHTML = '<div class="empty">尚未載入任何歌曲</div>';
}
</script>
