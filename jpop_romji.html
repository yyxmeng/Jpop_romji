<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f9f9f9;color:#222}
.app{max-width:820px;margin:0 auto;padding:1.5rem 1rem}
.header{border-bottom:1px solid #ddd;padding-bottom:1rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:20px;font-weight:500;color:#222}
.header p{font-size:13px;color:#888;margin-top:4px}
.toggle-wrap{display:flex;align-items:center;gap:8px;font-size:13px;color:#555}
.toggle{position:relative;width:44px;height:24px;cursor:pointer;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.slider{position:absolute;inset:0;background:#ccc;border-radius:24px;transition:.2s}
.slider:before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
input:checked+.slider{background:#555}
input:checked+.slider:before{transform:translateX(20px)}
.tabs{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.tab{padding:6px 14px;border:1px solid #ccc;border-radius:20px;font-size:13px;cursor:pointer;background:#fff;color:#555;transition:.15s}
.tab.active{background:#333;color:#fff;border-color:#333}
.songs{display:flex;flex-direction:column;gap:8px}
.song{padding:10px 14px;border:1px solid #ddd;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:#fff;transition:.15s}
.song:hover{background:#f5f5f5}
.st{font-size:15px;font-weight:500;color:#222}
.sa{font-size:12px;color:#888;margin-top:2px}
.lv{display:none}
.lv.show{display:block}
.lh{margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.lt{font-size:19px;font-weight:500;color:#222}
.la{font-size:13px;color:#888;margin-top:4px}
.lines{display:flex;flex-direction:column;gap:1.2rem;margin-top:1rem}
.lb{border-left:2px solid #ddd;padding-left:16px}
.jp{font-size:20px;line-height:3;display:flex;flex-wrap:wrap;align-items:flex-end;color:#222}
.lines rt{font-size:11px;color:#aaa;line-height:1.4;transition:opacity .15s,font-size .15s}
.lines.hide-rt rt{opacity:0;font-size:0;line-height:0}
.lines.hide-rt .jp{line-height:1.6}
.sec{border-top:1px solid #eee;margin:4px 0;display:flex;align-items:center}
.sec span{font-size:11px;color:#bbb;padding:2px 6px;letter-spacing:.05em}
.back{background:none;border:none;font-size:13px;color:#888;cursor:pointer;margin-bottom:1.2rem;padding:0}
.back:hover{color:#333}
ruby{ruby-align:center}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1>🎵 日文歌詞本</h1>
      <p>以歌手分類・按歌名首字排序</p>
    </div>
    <div class="toggle-wrap">
      <span>假名</span>
      <label class="toggle">
        <input type="checkbox" id="rt-toggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>
  <div id="list-view">
    <div class="tabs" id="tabs"></div>
    <div class="songs" id="songs"></div>
  </div>
  <div class="lv" id="lyric-view">
    <button class="back" onclick="showList()">← 返回列表</button>
    <div class="lh">
      <div><div class="lt" id="lv-title"></div><div class="la" id="lv-artist"></div></div>
      <div class="toggle-wrap">
        <span>假名</span>
        <label class="toggle">
          <input type="checkbox" id="rt-toggle2" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>
    <div class="lines" id="lv-lines"></div>
  </div>
</div>

<script>
// =========================================================
// 核心引擎（請勿修改）
// =========================================================
function r(b,f){return f?`<ruby>${b}<rt>${f}</rt></ruby>`:`<span>${b}</span>`}
function L(p){return`<div class="lb"><div class="jp">${p.map(x=>Array.isArray(x)?r(x[0],x[1]):r(x,'')).join('')}</div></div>`}
function S(t){return`<div class="sec"><span>${t}</span></div>`}

let showRt=true;
function syncToggles(val){
  showRt=val;
  document.getElementById('rt-toggle').checked=val;
  document.getElementById('rt-toggle2').checked=val;
  document.getElementById('lv-lines').classList.toggle('hide-rt',!val);
}
document.getElementById('rt-toggle').addEventListener('change',e=>syncToggles(e.target.checked));
document.getElementById('rt-toggle2').addEventListener('change',e=>syncToggles(e.target.checked));

let curArtist=null;
const DB={};// 歌手資料庫，由下方歌曲區塊填入

function addSong(artist,song){
  if(!DB[artist])DB[artist]=[];
  DB[artist].push(song);
}

function renderTabs(){
  const artists=Object.keys(DB).sort();
  document.getElementById('tabs').innerHTML=artists.map(a=>
    `<div class="tab${a===curArtist?' active':''}" onclick="pickArtist('${a.replace(/'/g,"\\'")}')">${a}</div>`
  ).join('');
}
function pickArtist(a){
  curArtist=a;
  renderTabs();
  renderSongs();
}
function renderSongs(){
  const songs=(DB[curArtist]||[]).slice().sort((a,b)=>a.sort.localeCompare(b.sort,'ja'));
  document.getElementById('songs').innerHTML=songs.map(s=>
    `<div class="song" onclick="showLyric('${s.id}')">
      <div><div class="st">${s.title}</div><div class="sa">${curArtist}</div></div>
      <span style="color:#bbb;font-size:18px">›</span>
    </div>`
  ).join('');
}
function showLyric(id){
  const song=Object.values(DB).flat().find(s=>s.id===id);
  if(!song)return;
  document.getElementById('lv-title').textContent=song.title;
  document.getElementById('lv-artist').textContent=curArtist;
  const el=document.getElementById('lv-lines');
  el.innerHTML=song.lines().join('');
  el.classList.toggle('hide-rt',!showRt);
  document.getElementById('list-view').style.display='none';
  document.getElementById('lyric-view').classList.add('show');
  window.scrollTo(0,0);
}
function showList(){
  document.getElementById('list-view').style.display='block';
  document.getElementById('lyric-view').classList.remove('show');
}
function init(){
  const artists=Object.keys(DB).sort();
  if(artists.length){curArtist=artists[0];renderTabs();renderSongs();}
}
// =========================================================

// ★ 歌曲區塊 ── 新增歌曲只需在這裡往下貼，格式見說明
