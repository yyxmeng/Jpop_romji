<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歌詞本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.home-wrap{
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
  text-align: center;
}
.home-deco{
  font-size: 38px;
  margin-bottom: 1.2rem;
  opacity: 0.7;
  animation: floatY 4s ease-in-out infinite;
}
@keyframes floatY{
  0%,100%{ transform: translateY(0); }
  50%{ transform: translateY(-8px); }
}
.home-title{
  font-family: var(--font-jp);
  font-size: clamp(22px, 5vw, 32px);
  font-weight: 300;
  letter-spacing: 0.18em;
  color: var(--text);
  margin-bottom: 0.5rem;
}
.home-sub{
  font-size: 13px;
  color: var(--text3);
  letter-spacing: 0.08em;
  margin-bottom: 3rem;
}
.home-cards{
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 340px;
}
.home-card{
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  background: var(--bg2);
  color: var(--text);
  text-decoration: none;
  transition: var(--transition);
  text-align: left;
}
.home-card:hover{
  border-color: var(--accent);
  background: var(--bg3);
  transform: translateX(4px);
}
.home-card-icon{
  font-size: 22px;
  flex-shrink: 0;
  width: 40px;
  text-align: center;
}
.home-card-text{}
.home-card-name{
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}
.home-card-desc{
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
}
.home-card-arrow{
  margin-left: auto;
  color: var(--text3);
  font-size: 18px;
  flex-shrink: 0;
}
.home-footer{
  margin-top: 3rem;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.06em;
}
</style>
</head>
<body>
<div class="home-wrap">
  <div class="home-deco">🎵</div>
  <div class="home-title">日文歌詞本</div>
  <div class="home-sub">J-POP Lyrics Collection</div>

  <div class="home-cards">
    <a class="home-card" href="index.html">
      <div class="home-card-icon">📖</div>
      <div class="home-card-text">
        <div class="home-card-name">歌詞本</div>
        <div class="home-card-desc">瀏覽歌手與歌曲歌詞</div>
      </div>
      <div class="home-card-arrow">›</div>
    </a>

    <a class="home-card" href="tools/lyrics_transfer.html">
      <div class="home-card-icon">🛠</div>
      <div class="home-card-text">
        <div class="home-card-name">歌詞轉換工具</div>
        <div class="home-card-desc">將 utaten 原始碼轉為 addSong()</div>
      </div>
      <div class="home-card-arrow">›</div>
    </a>

    <a class="home-card" href="https://utaten.com" target="_blank" rel="noopener">
      <div class="home-card-icon">🔗</div>
      <div class="home-card-text">
        <div class="home-card-name">UtaTen</div>
        <div class="home-card-desc">日文歌詞查詢網站</div>
      </div>
      <div class="home-card-arrow">↗</div>
    </a>
  </div>

  <div class="home-footer">以歌手分類・按歌名首字排序・含假名標注</div>
</div>
</body>
</html>
