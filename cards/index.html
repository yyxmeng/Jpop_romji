<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>歌曲單詞字卡 | Lyrmeng</title>

<link rel="stylesheet" href="../shared.css">

<style>

.page{
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.wrap{
  width:100%;
  max-width:820px;
  margin:auto;
  padding:32px 18px;
}

.selector{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.select-card{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:var(--radius);
  padding:18px;
  cursor:pointer;
  transition:var(--transition);
}

.select-card:hover{
  border-color:var(--accent);
  background:var(--bg3);
}

.select-title{
  font-size:15px;
  color:var(--text);
  margin-bottom:4px;
}

.select-desc{
  font-size:12px;
  color:var(--text3);
}

.hidden{
  display:none!important;
}

.player{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:22px;
}

.card-area{
  perspective:1400px;
  width:100%;
  max-width:560px;
}

.flashcard{
  position:relative;
  width:100%;
  min-height:360px;
  transform-style:preserve-3d;
  transition:.45s;
  cursor:pointer;
}

.flashcard.flipped{
  transform:rotateY(180deg);
}

.card-face{
  position:absolute;
  inset:0;
  backface-visibility:hidden;

  background:linear-gradient(
    180deg,
    var(--bg2),
    var(--bg3)
  );

  border:1px solid var(--border2);
  border-radius:18px;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  padding:32px;
}

.card-back{
  transform:rotateY(180deg);
}

.word{
  font-size:38px;
  font-family:var(--font-jp);
  color:var(--text);
  margin-bottom:14px;
  text-align:center;
}

.reading{
  font-size:14px;
  color:var(--accent2);
  margin-bottom:4px;
  line-height:1.2;
}



.back-row:last-child{
  margin-top:-4px;
}

.back-word{
  font-size:34px;
  font-family:var(--font-jp);
  color:var(--text);
  margin:0;
  line-height:1.15;
}

.origin{
  margin-top:10px;
  color:var(--text3);
  font-size:15px;
  font-style:italic;
}

.meta{
  margin-top:18px;
  font-size:12px;
  color:var(--text3);
}

.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.progress{
  font-size:13px;
  color:var(--text2);
}

.loading{
  text-align:center;
  color:var(--text3);
  padding:80px 0;
}

.row{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
}

.left{
  text-align:left;
}

.right{
  text-align:right;
}

.center{
  text-align:center;
  width:100%;
}

.type{
  font-size:18px;
  color:var(--text2);
}

.back-translation{
  font-size:18px;
  color:var(--text2);
}

.back-grid{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.back-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  width:100%;
}

@media(max-width:640px){

  .flashcard{
    min-height:300px;
  }

  .word{
    font-size:30px;
  }

  .translation{
    font-size:22px;
  }

}

</style>
</head>

<body>

<div class="page">

<div class="topbar">

  <div class="topbar-left">

    <a
      href="../home.html"
      class="topbar-home"
    >
      ⌂
    </a>

    <div class="topbar-title">
      歌曲單詞字卡
    </div>

  </div>

</div>

<div class="wrap">

<div
id="loading"
class="loading"
>

載入中...

</div>

<div
id="selector"
class="selector hidden"
>

<div class="section-label">
選擇字卡範圍
</div>

<div
class="select-card"
onclick="goMode('all')"
>

<div class="select-title">
全站字卡
</div>

<div class="select-desc">
瀏覽所有歌曲單詞
</div>

</div>

<div
class="select-card"
onclick="pickArtist()"
>

<div class="select-title">
依歌手
</div>

<div class="select-desc">
選擇單一歌手字卡
</div>

</div>

<div
class="select-card"
onclick="pickSong()"
>

<div class="select-title">
依歌曲
</div>

<div class="select-desc">
選擇單一歌曲字卡
</div>

</div>

</div>

<div
id="player"
class="player hidden"
>

<div class="progress">

<span id="progressNow">
1
</span>

/

<span id="progressTotal">
0
</span>

</div>

<div class="card-area">

<div
id="flashcard"
class="flashcard"
onclick="flipCard()"
>

<div class="card-face">

<div
id="word"
class="word"
>
—
</div>

<div
id="meta"
class="meta"
>
—
</div>

</div>

<div
class="card-face card-back"
>

<div
id="translation"
class="translation"
>
—
</div>

<div
id="origin"
class="origin"
>
</div>
  
<div
id="backSource"
class="meta"
>
</div>

</div>

</div>

</div>

<div class="controls">

<button
class="btn-sec"
onclick="prevCard()"
>
← 上一張
</button>

<button
class="btn-primary"
onclick="shuffleCards()"
>
Shuffle
</button>

<button
class="btn-sec"
onclick="nextCard()"
>
下一張 →
</button>

<button
class="btn-sec"
onclick="toggleLoop()"
id="loopBtn"
>
Loop: OFF
</button>

</div>

</div>

</div>

</div>

<script>

let cards=[];

let current=0;

let loop=false;

const params=
new URLSearchParams(
  location.search
);

async function loadJSON(path){

  const r=
  await fetch(path);

  return await r.json();
}

function qs(id){

  return document
  .getElementById(id);
}

function show(id){

  qs(id)
  .classList
  .remove('hidden');
}

function hide(id){

  qs(id)
  .classList
  .add('hidden');
}

function goMode(mode){

  location.href=
  `index.html?mode=${mode}`;
}

function pickArtist(){

  const name=
  prompt(
    '輸入歌手名稱'
  );

  if(!name){

    return;
  }

  location.href=
  `index.html?artist=${encodeURIComponent(name)}`;
}

function pickSong(){

  const name=
  prompt(
    '輸入歌名'
  );

  if(!name){

    return;
  }

  location.href=
  `index.html?title=${encodeURIComponent(name)}`;
}

function renderCard(){

  if(!cards.length){
    return;
  }

  const card=
  cards[current];

  qs('flashcard')
  .classList
  .remove('flipped');

  const sourcePool=
  buildDisplaySource(card);



  const frontSource=

  randomPick(
    sourcePool,
    1
  )[0];



  const backSources=

  randomPick(
    sourcePool,
    3
  );



  // ===== 正面 =====

  qs('word')
  .innerHTML=

`
<div class="row">

<div class="word left">

${card.word||''}

</div>

<div class="type right">

${card.type||''}

</div>

</div>
`;



  qs('meta')
  .innerHTML=

  frontSource

  ?

`

<div class="center">

${frontSource.line||''}

<br><br>

${frontSource.artist}
—
${frontSource.title}

</div>

`

  :

  '';



  // ===== 背面 =====

  qs('translation').innerHTML=
  `
  
  <div class="row">
  
  <div class="reading left">
  
  ${card.reading||''}
  
  </div>
  
  <div class="origin right">
  
  ${card.origin||''}
  
  </div>
  
  </div>
  
  <br>
  
  <div class="row">
  
  <div class="word left">
  
  ${card.word||''}
  
  </div>
  
  <div class="back-translation right">
  
  ${card.translation||'（未填寫翻譯）'}
  
  </div>
  
  </div>
  
  `;



  qs('backSource')
  .innerHTML=

  backSources

  .map(

    s=>

`
${s.artist}
—
${s.title}
—
${s.line||''}
`

  )

  .join('<br><br>');



  qs('progressNow')
  .textContent=
  current+1;

  qs('progressTotal')
  .textContent=
  cards.length;
}
  
function flipCard(){

  qs('flashcard')
  .classList
  .toggle('flipped');
}

function nextCard(){

  if(
    current
    <
    cards.length-1
  ){

    current++;

    renderCard();

    return;
  }

  if(loop){

    current=0;

    renderCard();
  }
}

function prevCard(){

  if(
    current>0
  ){

    current--;

    renderCard();

    return;
  }

  if(loop){

    current=
    cards.length-1;

    renderCard();
  }
}

function shuffleCards(){

  for(

    let i=
    cards.length-1;

    i>0;

    i--

  ){

    const j=
    Math.floor(

      Math.random()
      *
      (i+1)

    );

    [

      cards[i],
      cards[j]

    ]

    =

    [

      cards[j],
      cards[i]

    ];
  }

  current=0;

  renderCard();
}

function toggleLoop(){

  loop=!loop;

  qs('loopBtn')
  .textContent=

  loop

  ?

  'Loop: ON'

  :

  'Loop: OFF';
}

function filterCards(

  source,
  query

){

  if(

    query.has('mode')

    &&

    query.get('mode')
    ===
    'all'

  ){

    return source;
  }

  if(

    query.has('artist')

  ){

    const artist=
    query.get(
      'artist'
    );

    return source.filter(

      c=>

      (

        c.sources
        ||
        []

      )

      .some(

        s=>

        s.artist
        ===
        artist

      )
    );
  }

  if(

    query.has('song')

  ){

    const song=
    query.get(
      'song'
    );

    return source.filter(

      c=>

      (

        c.sources
        ||
        []

      )

      .some(

        s=>

        s.song
        ===
        song

      )
    );
  }

  return [];
}

let touchStartX=0;

document
.addEventListener(

  'touchstart',

  e=>{

    touchStartX=

    e.touches[0]
    .clientX;
  }
);

document
.addEventListener(

  'touchend',

  e=>{

    const diff=

    e.changedTouches[0]
    .clientX

    -

    touchStartX;

    if(
      Math.abs(diff)
      <60
    ){

      return;
    }

    if(
      diff<0
    ){

      nextCard();
    }

    else{

      prevCard();
    }
  }
);

document
.addEventListener(

  'keydown',

  e=>{

    if(
      e.key
      ===
      'ArrowRight'
    ){

      nextCard();
    }

    if(
      e.key
      ===
      'ArrowLeft'
    ){

      prevCard();
    }

    if(
      e.key
      ===
      ' '
    ){

      e.preventDefault();

      flipCard();
    }
  }
);

async function init(){

  try{

    const data=

    await loadJSON(
      'data/cards.json'
    );

    hide('loading');

    if(

      !params.toString()

    ){

      show('selector');

      return;
    }

    cards=
    filterCards(
      data,
      params
    );

    if(

      !cards.length

    ){

      qs('loading')
      .textContent=

      '找不到符合條件的字卡';

      show('loading');

      return;
    }

    show('player');

    renderCard();
  }

  catch(e){

    console.error(e);

    qs('loading')
    .textContent=
    '載入失敗';
  }
}

init();

</script>

<script>
function randomPick(arr,count){

  if(!arr?.length){

    return [];
  }

  const copy=[...arr];

  copy.sort(

    ()=>Math.random()-0.5
  );

  return copy.slice(0,count);
}
</script>

<script>
function buildDisplaySource(card){

  const mode=
  params.get('mode');

  const artist=
  params.get('artist');

  const song=
  params.get('song');

  let list=
  card.sources||[];

  if(song){

    list=
    list.filter(

      s=>

      s.id===song
    );
  }

  else if(artist){

    list=
    list.filter(

      s=>

      s.artist===artist
    );
  }

  return list;
}
</script>

</body>
</html>
