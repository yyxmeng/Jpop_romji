<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>
Review維護頁
</title>

<link
rel="stylesheet"
href="../shared.css">

<style>

body{

padding:20px;
}

.toolbar{

display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.columns{

display:grid;

grid-template-columns:
repeat(
3,
1fr
);

gap:20px;
}

.panel{

border:1px solid #555;

border-radius:12px;

padding:16px;

min-height:700px;
}

.actions{

display:flex;

flex-wrap:wrap;

gap:8px;

margin-bottom:14px;
}

.card{

border:1px solid #444;

border-radius:8px;

padding:10px;

margin-bottom:10px;
}

.meta{

font-size:.9em;
opacity:.7;
}

.source{

font-size:.82em;
opacity:.8;
margin-top:6px;
}

button{

cursor:pointer;
}

#batchLog{

margin-top:16px;

white-space:pre-wrap;

border:1px solid #444;

border-radius:10px;

padding:12px;

min-height:100px;
}

.hiddenExisting{

display:none;
}

@media(
max-width:1200px
){

.columns{

grid-template-columns:
1fr;
}

}

</style>

</head>

<body>

<h1>
Review維護頁
</h1>

<div class="toolbar">

<input
id="githubToken"
type="password"
placeholder="GitHub Token">

<input
id="translateToken"
placeholder="Apify Token">

<button
onclick="saveAll()">

保存全部

</button>

</div>

<div class="toolbar">

<textarea
id="batchFolder"
rows="6"
style="
width:600px;
max-width:100%;
"
placeholder="
songs/ave_mujica/xxx.js
songs/ave_mujica/yyy.js
可一次輸入多筆
"></textarea>

<button
onclick="batchGenerate()">

批次生成

</button>

</div>

<div
id="batchLog">

</div>

<div class="columns">

<section class="panel">

<h2>

新字卡

(
<span
id="pendingCount">

0

</span>
)

</h2>

<div class="actions">

<button
onclick="
toggleSelect(
'pending'
)
">

全選/取消

</button>

<button
onclick="
moveSelected(
'pending',
'cards'
)
">

→ 已加入

</button>

<button
onclick="
moveSelected(
'pending',
'stopwords'
)
">

→ 不加入

</button>

</div>

<div
id="pendingList">

</div>

</section>

<section class="panel">

<h2>

不加入

(
<span
id="stopwordsCount">

0

</span>
)

</h2>

<div class="actions">

<button
onclick="
toggleSelect(
'stopwords'
)
">

全選/取消

</button>

<button
onclick="
moveSelected(
'stopwords',
'pending'
)
">

→ 新字卡

</button>

<button
onclick="
moveSelected(
'stopwords',
'cards'
)
">

→ 已加入

</button>

<button
onclick="
toggleExisting(
'stopwords'
)
">

顯示/隱藏既有

</button>

</div>

<div
id="stopwordsList">

</div>

</section>

<section class="panel">

<h2>

已加入

(
<span
id="cardsCount">

0

</span>
)

</h2>

<div class="actions">

<button
onclick="
toggleSelect(
'cards'
)
">

全選/取消

</button>

<button
onclick="
moveSelected(
'cards',
'pending'
)
">

→ 新字卡

</button>

<button
onclick="
moveSelected(
'cards',
'stopwords'
)
">

→ 不加入

</button>

<button
onclick="
toggleExisting(
'cards'
)
">

顯示/隱藏既有

</button>

</div>

<div
id="cardsList">

</div>

</section>

</div>

<script
src="kuromoji.js">

</script>

<script
src="review.js">

</script>
</body>
</html>
